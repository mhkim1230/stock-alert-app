name: Refresh Market Snapshots

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh stock snapshots
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.RENDER_BASE_URL }}/internal/refresh-watchlist-quotes" \
            -H "X-Admin-Key: ${{ secrets.ADMIN_API_KEY }}"

      - name: Refresh FX snapshots
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.RENDER_BASE_URL }}/internal/refresh-fx-quotes" \
            -H "X-Admin-Key: ${{ secrets.ADMIN_API_KEY }}"
