name: Refresh Market Snapshots

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      RENDER_BASE_URL: ${{ secrets.RENDER_BASE_URL }}
      ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
    steps:
      - name: Validate secrets
        run: |
          set -eu
          if [ -z "${RENDER_BASE_URL:-}" ]; then
            echo "RENDER_BASE_URL secret is missing"
            exit 1
          fi
          if [ -z "${ADMIN_API_KEY:-}" ]; then
            echo "ADMIN_API_KEY secret is missing"
            exit 1
          fi
          echo "Using base URL: ${RENDER_BASE_URL}"

      - name: Refresh stock snapshots
        run: |
          set -eu
          tmp_body="$(mktemp)"
          status_code="$(curl --silent --show-error \
            --output "${tmp_body}" \
            --write-out "%{http_code}" \
            --max-time 90 \
            -X POST "${RENDER_BASE_URL}/internal/refresh-watchlist-quotes" \
            -H "X-Admin-Key: ${ADMIN_API_KEY}")"
          echo "Stock refresh status: ${status_code}"
          cat "${tmp_body}"
          echo
          if [ "${status_code}" -lt 200 ] || [ "${status_code}" -ge 300 ]; then
            exit 1
          fi

      - name: Refresh FX snapshots
        run: |
          set -eu
          tmp_body="$(mktemp)"
          status_code="$(curl --silent --show-error \
            --output "${tmp_body}" \
            --write-out "%{http_code}" \
            --max-time 90 \
            -X POST "${RENDER_BASE_URL}/internal/refresh-fx-quotes" \
            -H "X-Admin-Key: ${ADMIN_API_KEY}")"
          echo "FX refresh status: ${status_code}"
          cat "${tmp_body}"
          echo
          if [ "${status_code}" -lt 200 ] || [ "${status_code}" -ge 300 ]; then
            exit 1
          fi
