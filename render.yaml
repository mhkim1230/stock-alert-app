services:
  - type: web
    name: stock-alert-api
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -c backend/constraints.txt -r backend/requirements.txt
    startCommand: |
      cd backend
      python -m uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.9"
      - key: DEBUG
        value: false
      - key: AUTO_CREATE_TABLES
        value: true
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: REQUEST_TIMEOUT
        value: "10"
      - key: APNS_KEY_ID
        sync: false
      - key: APNS_TEAM_ID
        sync: false
      - key: APNS_BUNDLE_ID
        value: com.stockalert.app
      - key: APNS_PRIVATE_KEY
        sync: false
      - key: APNS_USE_SANDBOX
        value: true
    healthCheckPath: /health

  - type: cron
    name: stock-alert-alert-cron
    env: bash
    schedule: "*/5 * * * *"
    buildCommand: "echo cron ready"
    startCommand: "curl -X POST https://YOUR_RENDER_APP.onrender.com/internal/run-alert-checks -H \"X-Admin-Key: $ADMIN_API_KEY\""
    envVars:
      - key: ADMIN_API_KEY
        sync: false
